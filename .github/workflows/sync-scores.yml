name: Sync match scores

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-scores endpoint
        run: |
          curl -sf -X GET "${{ secrets.APP_URL }}/api/admin/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -o /dev/null
